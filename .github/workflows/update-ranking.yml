name: Update ranking.json

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'public/ranking.json'
  schedule:
    # 木曜 18:00 JST = 金曜 09:00 UTC (JST-9)
    - cron: '0 9 * * 4'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download previous ranking snapshot
        run: curl -fsSL "$PREVIOUS_RANKING_URL" -o /tmp/previous-ranking.json || true
        env:
          PREVIOUS_RANKING_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/ranking.json

      - name: Generate ranking.json
        run: node scripts/scrape-rankings.js
        env:
          PREVIOUS_RANKING_FILE: /tmp/previous-ranking.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
